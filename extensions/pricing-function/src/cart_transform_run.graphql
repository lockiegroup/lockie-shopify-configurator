query CartTransformRunInput {
  cart {
    lines {
      id
      quantity
      orderedQuantity: attribute(key: "_quantity") { key value }
      specialNumbering: attribute(key: "_special_numbering") { key value }
      specials: attribute(key: "_specials") { key value }
      holyDaysCount: attribute(key: "_holydays_count") { key value }
      displayFieldsJson: attribute(key: "_display_fields_json") { key value }
      merchandise {
        ... on ProductVariant {
          id
          product {
            priceTable: metafield(namespace: "custom", key: "price_table") { jsonValue }
            addonFees: metafield(namespace: "custom", key: "addon_fees") { jsonValue }
          }
        }
      }
    }
  }
}
